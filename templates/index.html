<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Emotion Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            padding: 30px;
            background: #f8f9ff;
            border-radius: 15px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .emotion-display {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .emotion-emoji {
            font-size: 5em;
            margin-bottom: 10px;
        }
        
        .emotion-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
        }
        
        .confidence {
            font-size: 1.5em;
            color: #667eea;
            margin-top: 10px;
        }
        
        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 1s ease;
        }
        
        .all-scores {
            margin-top: 20px;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Voice Emotion Detection</h1>
        <p class="subtitle">Upload an audio file to detect emotions</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🎵</div>
            <p><strong>Click to upload</strong> or drag and drop</p>
            <p style="color: #999; margin-top: 10px;">Supports: WAV, MP3, FLAC, OGG</p>
            <input type="file" id="audioFile" accept="audio/*">
        </div>
        
        <div style="text-align: center; margin: 20px 0; color: #666;">
            <p>— OR —</p>
        </div>
        
        <button class="btn" id="recordBtn" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            🎤 Record Live Audio
        </button>
        
        <p id="fileName" style="text-align: center; color: #666; margin-top: 10px;"></p>
        <p id="recordStatus" style="text-align: center; color: #f5576c; margin-top: 10px;"></p>
        
        <button class="btn" id="analyzeBtn" disabled>Analyze Emotion</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing emotion...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="emotion-display">
                <div class="emotion-emoji" id="emoji"></div>
                <div class="emotion-name" id="emotionName"></div>
                <div class="confidence" id="confidence"></div>
            </div>
            
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill"></div>
            </div>
            
            <div class="all-scores" id="allScores"></div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('audioFile');
        const fileName = document.getElementById('fileName');
        const recordBtn = document.getElementById('recordBtn');
        const recordStatus = document.getElementById('recordStatus');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        
        let selectedFile = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileName.textContent = `Selected: ${selectedFile.name}`;
                analyzeBtn.disabled = false;
                result.classList.remove('show');
                error.classList.remove('show');
            }
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                fileInput.files = e.dataTransfer.files;
                fileName.textContent = `Selected: ${selectedFile.name}`;
                analyzeBtn.disabled = false;
                result.classList.remove('show');
                error.classList.remove('show');
            }
        });
        
        // Record button
        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        selectedFile = new File([audioBlob], 'recording.wav', { type: 'audio/wav' });
                        fileName.textContent = '🎤 Recording captured!';
                        analyzeBtn.disabled = false;
                        result.classList.remove('show');
                        error.classList.remove('show');
                        
                        // Stop all tracks
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.textContent = '⏹️ Stop Recording';
                    recordBtn.style.background = 'linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%)';
                    recordStatus.textContent = '🔴 Recording... Speak now!';
                    
                } catch (err) {
                    showError('Microphone access denied or not available: ' + err.message);
                }
            } else {
                // Stop recording
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.textContent = '🎤 Record Live Audio';
                recordBtn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                recordStatus.textContent = '';
            }
        });
        
        // Analyze button
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            analyzeBtn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');
            
            const formData = new FormData();
            formData.append('audio', selectedFile);
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(data);
                } else {
                    showError(data.error || 'Unknown error');
                }
            } catch (err) {
                showError('Failed to analyze audio: ' + err.message);
            } finally {
                loading.classList.remove('show');
                analyzeBtn.disabled = false;
            }
        });
        
        function showResult(data) {
            document.getElementById('emoji').textContent = data.emoji;
            document.getElementById('emotionName').textContent = data.emotion;
            document.getElementById('confidence').textContent = 
                `Confidence: ${data.confidence.toFixed(2)}%`;
            document.getElementById('confidenceFill').style.width = 
                `${data.confidence}%`;
            
            // Show all scores
            const scoresHtml = Object.entries(data.all_scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([emotion, score]) => `
                    <div class="score-item">
                        <span>${emotion.toUpperCase()}</span>
                        <span><strong>${score.toFixed(2)}%</strong></span>
                    </div>
                `).join('');
            
            document.getElementById('allScores').innerHTML = 
                '<h3 style="margin-bottom: 10px;">Top Predictions:</h3>' + scoresHtml;
            
            result.classList.add('show');
        }
        
        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('show');
        }
    </script>
</body>
</html>
